<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — En Vivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #12151c;
    --bg3: #1a1e28;
    --bg4: #222736;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f2f7;
    --muted: #7a8499;
    --muted2: #4a5268;
    --accent: #4CAF8D;
    --accent2: #3a9b7a;
    --gold: #f0b429;
    --red: #e05252;
    --blue: #5b8dee;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .logo-text span { color: var(--accent); }
  .header-clock {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .header-clock strong {
    display: block;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* ── NAV ── */
  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
  }
  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── LAYOUT ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
  }
  @media(max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── PANEL ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── SECTION HEADING ── */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text);
  }
  .section-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-live { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); }
  .badge-today { background: rgba(76,175,141,0.1); color: var(--accent); border: 1px solid rgba(76,175,141,0.2); }

  /* ── PARTIDO CARD ── */
  .partidos-list { display: flex; flex-direction: column; gap: 10px; }

  .partido-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    transition: border-color .2s, transform .1s;
    cursor: pointer;
  }
  .partido-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .partido-card.live { border-left: 3px solid var(--red); }
  .partido-card.upcoming { border-left: 3px solid var(--accent); }
  .partido-card.finished { border-left: 3px solid var(--muted2); }

  .partido-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .partido-meta .grupo { color: var(--accent); font-weight: 600; }
  .partido-estado-live {
    display: flex; align-items: center; gap: 5px;
    color: var(--red); font-weight: 600;
  }
  .dot-live {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .partido-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }
  .team { display: flex; align-items: center; gap: 10px; }
  .team.away { flex-direction: row-reverse; }
  .team-flag { font-size: 28px; line-height: 1; }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .team-rank {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }
  .score-box {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-direction: column;
  }
  .score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }
  .score-sep { color: var(--muted2); }
  .score-time {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }
  .score-prox {
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Penales */
  .partido-penales {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .partido-penales strong { color: var(--gold); }

  /* Stats bar */
  .partido-stats {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .partido-card.live .partido-stats,
  .partido-card.finished .partido-stats { display: block; }

  .stat-row {
    display: grid;
    grid-template-columns: 2fr 3fr 2fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .stat-label { text-align: center; color: var(--muted); font-size: 11px; }
  .stat-val { font-weight: 600; }
  .stat-val.left { text-align: right; }
  .stat-val.right { text-align: left; }
  .stat-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--bg4);
    display: flex;
    overflow: hidden;
  }
  .stat-fill-left { background: var(--accent); border-radius: 2px 0 0 2px; transition: width .4s; }
  .stat-fill-right { background: var(--blue); border-radius: 0 2px 2px 0; transition: width .4s; margin-left: auto; }

  /* ── GOLEADORES CARD ── */
  .goleadores-list { display: flex; flex-direction: column; gap: 8px; }
  .goleador-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color .2s;
  }
  .goleador-row:hover { border-color: var(--border2); }
  .goleador-pos {
    font-size: 13px; font-weight: 700;
    color: var(--muted); min-width: 20px;
    text-align: center;
  }
  .goleador-pos.top1 { color: var(--gold); }
  .goleador-pos.top2 { color: #adb5c8; }
  .goleador-pos.top3 { color: #c8884a; }
  .goleador-flag { font-size: 22px; }
  .goleador-info { flex: 1; }
  .goleador-name { font-weight: 600; font-size: 14px; }
  .goleador-club { font-size: 11px; color: var(--muted); }
  .goleador-goles {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 800;
    color: var(--accent);
  }
  .goleador-goles span { font-size: 11px; font-weight: 400; color: var(--muted); }

  /* ── TABLA GRUPO ── */
  .tabla-grupo {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .tabla-grupo-head {
    padding: 12px 16px;
    background: var(--bg3);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
  }
  .tabla-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .tabla-table thead th {
    padding: 8px 10px;
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .tabla-table thead th:first-child { text-align: left; padding-left: 14px; }
  .tabla-table tbody tr {
    transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .tabla-table tbody tr:last-child { border-bottom: none; }
  .tabla-table tbody tr:hover { background: var(--bg3); }
  .tabla-table tbody tr.clasifica { background: rgba(76,175,141,0.04); }
  .tabla-table tbody td {
    padding: 9px 10px;
    text-align: center;
    color: var(--text);
  }
  .tabla-table tbody td:first-child {
    text-align: left;
    padding-left: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tabla-flag { font-size: 18px; }
  .tabla-team-name { font-weight: 500; }
  .tabla-pts { font-weight: 700; color: var(--accent); }
  .clasifica-bar {
    width: 3px; height: 26px;
    border-radius: 2px;
    background: var(--accent);
    margin-right: 2px;
    flex-shrink: 0;
  }
  .clasifica-bar.kos { background: var(--gold); }

  /* ── NOTICIAS ── */
  .noticias-list { display: flex; flex-direction: column; gap: 10px; }
  .noticia-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color .2s;
    cursor: pointer;
  }
  .noticia-card:hover { border-color: var(--border2); }
  .noticia-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .noticia-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .noticia-meta { font-size: 11px; color: var(--muted); }

  /* ── ESTADÍSTICAS GLOBALES ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-card-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .side-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .side-card-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .side-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .side-item:last-child { border-bottom: none; }
  .side-item-flag { font-size: 20px; }
  .side-item-name { flex: 1; font-weight: 500; }
  .side-item-val { font-weight: 700; color: var(--accent); font-size: 15px; }
  .side-item-detail { font-size: 11px; color: var(--muted); }

  /* ── PRÓXIMO ── */
  .proximos-list { display: flex; flex-direction: column; gap: 8px; }
  .proximo-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .proximo-item:last-child { border-bottom: none; }
  .proximo-teams {
    font-weight: 600;
    font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .proximo-hora {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    text-align: right;
    min-width: 70px;
  }
  .proximo-dia { font-size: 10px; color: var(--muted); }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity .4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: 1px;
  }
  .loader-logo span { color: var(--accent); }
  .loader-bar {
    width: 200px; height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-fill {
    height: 100%; width: 0;
    background: var(--accent);
    border-radius: 2px;
    transition: width .3s ease;
  }
  .loader-text { font-size: 12px; color: var(--muted); }

  /* ── ERROR / INFO ── */
  .info-box {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin: 10px 0;
  }
  .info-box.error { border-color: rgba(224,82,82,0.3); color: var(--red); }
  .info-box strong { color: var(--text); display: block; margin-bottom: 4px; }

  /* ── PILL FASE ── */
  .fase-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .fase-grupos { background: rgba(91,141,238,0.15); color: var(--blue); }
  .fase-octavos { background: rgba(240,180,41,0.15); color: var(--gold); }
  .fase-cuartos { background: rgba(240,180,41,0.2); color: var(--gold); }
  .fase-semis { background: rgba(224,82,82,0.15); color: var(--red); }
  .fase-final { background: rgba(76,175,141,0.15); color: var(--accent); }

  /* ── UPDATE BADGE ── */
  .last-update {
    text-align: right;
    font-size: 11px;
    color: var(--muted2);
    padding: 4px 0 14px;
  }
  .last-update span { color: var(--muted); }

  /* ── RESPONSIVE ── */
  @media(max-width:600px) {
    .main { padding: 12px; }
    .team-flag { font-size: 22px; }
    .score { font-size: 28px; }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-logo">MUNDIAL <span>2026</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
  <div class="loader-text" id="loaderText">Consultando partidos...</div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">⚽</div>
      <span class="logo-text">MUNDIAL <span>2026</span></span>
    </a>
    <div class="header-clock">
      <strong id="clock">--:--:--</strong>
      <span>Argentina (UTC-3)</span>
    </div>
  </div>
</header>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showPanel('partidos', this)">⚽ Partidos</button>
    <button class="nav-btn" onclick="showPanel('tabla', this)">📊 Posiciones</button>
    <button class="nav-btn" onclick="showPanel('goleadores', this)">🥅 Goleadores</button>
    <button class="nav-btn" onclick="showPanel('estadisticas', this)">📈 Estadísticas</button>
    <button class="nav-btn" onclick="showPanel('noticias', this)">📰 Noticias</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="content">

    <!-- PARTIDOS -->
    <div class="panel active" id="panel-partidos">
      <div id="content-partidos">
        <div class="info-box">Cargando partidos...</div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="panel" id="panel-tabla">
      <div id="content-tabla">
        <div class="info-box">Cargando posiciones...</div>
      </div>
    </div>

    <!-- GOLEADORES -->
    <div class="panel" id="panel-goleadores">
      <div id="content-goleadores">
        <div class="info-box">Cargando goleadores...</div>
      </div>
    </div>

    <!-- ESTADÍSTICAS -->
    <div class="panel" id="panel-estadisticas">
      <div id="content-estadisticas">
        <div class="info-box">Cargando estadísticas...</div>
      </div>
    </div>

    <!-- NOTICIAS -->
    <div class="panel" id="panel-noticias">
      <div id="content-noticias">
        <div class="info-box">Cargando noticias...</div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="info-box">Cargando...</div>
  </aside>
</div>

<script>
// ─────────────────────────────────────────────
// RELOJ ARGENTINA (UTC-3)
// ─────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const ar = new Date(now.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
  const h = String(ar.getHours()).padStart(2,'0');
  const m = String(ar.getMinutes()).padStart(2,'0');
  const s = String(ar.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─────────────────────────────────────────────
// NAVEGACIÓN
// ─────────────────────────────────────────────
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// ─────────────────────────────────────────────
// HORA ARGENTINA
// ─────────────────────────────────────────────
function toArgentinaTime(utcStr) {
  if (!utcStr) return '--:--';
  const d = new Date(utcStr);
  if (isNaN(d)) return '--:--';
  return d.toLocaleString('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
}
function toArgentinaDate(utcStr) {
  if (!utcStr) return '';
  const d = new Date(utcStr);
  if (isNaN(d)) return '';
  return d.toLocaleString('es-AR', {
    timeZone: 'America/Argentina/Buenos_Aires',
    weekday: 'short', day: 'numeric', month: 'short'
  });
}
function nowAR() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
}

// ─────────────────────────────────────────────
// API ANTHROPIC — motor de datos
// ─────────────────────────────────────────────
const SYSTEM_PROMPT = `Eres el asistente de datos del Mundial 2026. 
Siempre responde SOLO con JSON válido, sin texto extra, sin markdown, sin bloques de código.
Usa únicamente web_search para obtener datos actualizados.
Todos los horarios deben estar en UTC-3 (Argentina).
Todos los textos en español.`;

async function askClaude(userPrompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      system: SYSTEM_PROMPT,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  const data = await res.json();
  const text = data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ─────────────────────────────────────────────
// RENDER PARTIDOS
// ─────────────────────────────────────────────
function estadoLabel(partido) {
  const st = (partido.estado || '').toLowerCase();
  if (st === 'en_vivo' || st === 'live' || st === 'en vivo') return 'live';
  if (st === 'finalizado' || st === 'terminado' || st === 'ft') return 'finished';
  return 'upcoming';
}

function faseClass(fase) {
  if (!fase) return '';
  const f = fase.toLowerCase();
  if (f.includes('grupo')) return 'fase-grupos';
  if (f.includes('octavo')) return 'fase-octavos';
  if (f.includes('cuarto')) return 'fase-cuartos';
  if (f.includes('semi')) return 'fase-semis';
  if (f.includes('final')) return 'fase-final';
  return 'fase-grupos';
}

function renderStatRow(label, valL, valR) {
  const total = (parseFloat(valL)||0) + (parseFloat(valR)||0);
  const pctL = total > 0 ? Math.round((parseFloat(valL)/total)*100) : 50;
  const pctR = 100 - pctL;
  return `
    <div class="stat-row">
      <div class="stat-val left">${valL}</div>
      <div>
        <div class="stat-label" style="margin-bottom:3px">${label}</div>
        <div class="stat-bar">
          <div class="stat-fill-left" style="width:${pctL}%"></div>
          <div class="stat-fill-right" style="width:${pctR}%"></div>
        </div>
      </div>
      <div class="stat-val right">${valR}</div>
    </div>`;
}

function renderPartidoCard(p) {
  const tipo = estadoLabel(p);
  const hora = toArgentinaTime(p.hora_utc || p.hora);
  const fecha = toArgentinaDate(p.hora_utc || p.hora);

  let estadoHTML = '';
  if (tipo === 'live') {
    estadoHTML = `<span class="partido-estado-live"><span class="dot-live"></span>${p.minuto || 'En vivo'}'</span>`;
  } else if (tipo === 'finished') {
    estadoHTML = `<span style="color:var(--muted);font-weight:600">Finalizado</span>`;
  } else {
    estadoHTML = `<span style="color:var(--accent);font-weight:700">${hora}</span>`;
  }

  const scoreHTML = (tipo === 'upcoming')
    ? `<div class="score-prox">${hora}</div><div style="font-size:10px;color:var(--muted)">${fecha}</div>`
    : `<div class="score">${p.goles_local ?? '-'}<span class="score-sep" style="font-size:24px;margin:0 4px">–</span>${p.goles_visita ?? '-'}</div>
       ${tipo === 'live' ? `<div class="score-time">${p.minuto || ''}' </div>` : ''}`;

  let statsHTML = '';
  if (p.stats && (tipo === 'live' || tipo === 'finished')) {
    statsHTML = `<div class="partido-stats">
      ${p.stats.posesion ? renderStatRow('Posesión', p.stats.posesion[0]+'%', p.stats.posesion[1]+'%') : ''}
      ${p.stats.tiros ? renderStatRow('Tiros al arco', p.stats.tiros[0], p.stats.tiros[1]) : ''}
      ${p.stats.corners ? renderStatRow('Córners', p.stats.corners[0], p.stats.corners[1]) : ''}
      ${p.stats.faltas ? renderStatRow('Faltas', p.stats.faltas[0], p.stats.faltas[1]) : ''}
    </div>`;
  }

  let penalesHTML = '';
  if (p.penales) {
    penalesHTML = `<div class="partido-penales">Penales: <strong>${p.penales[0]} – ${p.penales[1]}</strong></div>`;
  }

  return `
  <div class="partido-card ${tipo}">
    <div class="partido-meta">
      <span><span class="grupo">${p.fase || 'Fase de Grupos'}</span> · ${p.estadio || ''}</span>
      ${estadoHTML}
    </div>
    <div class="partido-teams">
      <div class="team">
        <span class="team-flag">${p.bandera_local || '🏳'}</span>
        <div>
          <div class="team-name">${p.local || ''}</div>
          <div class="team-rank">${p.ranking_local ? 'FIFA #'+p.ranking_local : ''}</div>
        </div>
      </div>
      <div class="score-box">${scoreHTML}</div>
      <div class="team away">
        <span class="team-flag">${p.bandera_visita || '🏳'}</span>
        <div style="text-align:right">
          <div class="team-name">${p.visita || ''}</div>
          <div class="team-rank">${p.ranking_visita ? 'FIFA #'+p.ranking_visita : ''}</div>
        </div>
      </div>
    </div>
    ${penalesHTML}
    ${statsHTML}
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER TABLA GRUPOS
// ─────────────────────────────────────────────
function renderTablaGrupo(grupo) {
  const rows = grupo.equipos.map((eq, i) => {
    const clasifica = i < 2;
    const barClass = i < 2 ? '' : '';
    return `<tr class="${clasifica ? 'clasifica' : ''}">
      <td>
        ${clasifica ? `<div class="clasifica-bar ${grupo.fase_siguiente === 'knockout' ? 'kos' : ''}"></div>` : '<div style="width:5px"></div>'}
        <span class="tabla-flag">${eq.bandera || '🏳'}</span>
        <span class="tabla-team-name">${eq.nombre}</span>
      </td>
      <td>${eq.pj ?? 0}</td>
      <td>${eq.g ?? 0}</td>
      <td>${eq.e ?? 0}</td>
      <td>${eq.p ?? 0}</td>
      <td>${eq.gf ?? 0}</td>
      <td>${eq.gc ?? 0}</td>
      <td>${(eq.gf??0)-(eq.gc??0) >= 0 ? '+':''} ${(eq.gf??0)-(eq.gc??0)}</td>
      <td class="tabla-pts">${eq.pts ?? 0}</td>
    </tr>`;
  }).join('');

  return `<div class="tabla-grupo">
    <div class="tabla-grupo-head">Grupo ${grupo.grupo}</div>
    <table class="tabla-table">
      <thead><tr>
        <th style="width:40%">Equipo</th>
        <th>PJ</th><th>G</th><th>E</th><th>P</th>
        <th>GF</th><th>GC</th><th>DG</th>
        <th>Pts</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER GOLEADORES
// ─────────────────────────────────────────────
function renderGoleadores(lista) {
  return lista.map((g, i) => {
    const posClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    return `<div class="goleador-row">
      <div class="goleador-pos ${posClass}">${medal || (i+1)}</div>
      <span class="goleador-flag">${g.bandera || '🏳'}</span>
      <div class="goleador-info">
        <div class="goleador-name">${g.nombre}</div>
        <div class="goleador-club">${g.seleccion || ''}</div>
      </div>
      <div class="goleador-goles">${g.goles}<span> gol${g.goles !== 1 ? 'es' : ''}</span></div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// RENDER ESTADÍSTICAS GLOBALES
// ─────────────────────────────────────────────
function renderEstadisticas(data) {
  const gen = data.generales || {};
  const statsCards = [
    { num: gen.partidos_jugados ?? '—', label: 'Partidos jugados' },
    { num: gen.total_goles ?? '—', label: 'Goles totales' },
    { num: gen.promedio_goles ?? '—', label: 'Promedio por partido' },
    { num: gen.total_tarjetas_amarillas ?? '—', label: 'Tarjetas amarillas' },
    { num: gen.total_tarjetas_rojas ?? '—', label: 'Tarjetas rojas' },
    { num: gen.penales_convertidos ?? '—', label: 'Penales conv.' },
  ].map(c => `<div class="stat-card">
    <div class="stat-card-num">${c.num}</div>
    <div class="stat-card-label">${c.label}</div>
  </div>`).join('');

  // Top asistencias
  let asistHTML = '';
  if (data.asistencias && data.asistencias.length) {
    asistHTML = `<div class="section-head" style="margin-top:20px">
      <span class="section-title">🎯 Máximos Asistidores</span>
    </div>
    <div class="goleadores-list">
    ${data.asistencias.slice(0,5).map((g, i) => `<div class="goleador-row">
      <div class="goleador-pos ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div>
      <span class="goleador-flag">${g.bandera || '🏳'}</span>
      <div class="goleador-info">
        <div class="goleador-name">${g.nombre}</div>
        <div class="goleador-club">${g.seleccion || ''}</div>
      </div>
      <div class="goleador-goles">${g.asistencias}<span> asist.</span></div>
    </div>`).join('')}
    </div>`;
  }

  return `<div class="section-head">
    <span class="section-title">📊 Estadísticas del Torneo</span>
    <span class="section-badge badge-today">${gen.jornada || 'Mundial 2026'}</span>
  </div>
  <div class="stats-grid">${statsCards}</div>
  ${asistHTML}`;
}

// ─────────────────────────────────────────────
// RENDER NOTICIAS
// ─────────────────────────────────────────────
function renderNoticias(lista) {
  return lista.map(n => `<div class="noticia-card" onclick="window.open('${n.url || '#'}','_blank')">
    <div class="noticia-tag">${n.categoria || 'Mundial'}</div>
    <div class="noticia-title">${n.titulo}</div>
    <div class="noticia-meta">${n.medio || ''} · ${n.hora || ''}</div>
  </div>`).join('');
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function renderSidebar(data) {
  let html = '';

  // Próximos partidos
  if (data.proximos && data.proximos.length) {
    html += `<div class="side-card">
      <div class="side-card-head">📅 Próximos Partidos</div>
      <div>
      ${data.proximos.map(p => `
        <div class="proximo-item">
          <div>
            <div class="proximo-teams">${p.bandera_local || ''} ${p.local} <span style="color:var(--muted)">vs</span> ${p.visita} ${p.bandera_visita || ''}</div>
            <div class="proximo-dia">${p.fase || ''}</div>
          </div>
          <div class="proximo-hora">${toArgentinaTime(p.hora_utc || p.hora)}<div class="proximo-dia">${toArgentinaDate(p.hora_utc || p.hora)}</div></div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // Top goleadores compacto
  if (data.top_goleadores && data.top_goleadores.length) {
    html += `<div class="side-card">
      <div class="side-card-head">🥅 Top Goleadores</div>
      ${data.top_goleadores.slice(0,5).map(g => `
        <div class="side-item">
          <span class="side-item-flag">${g.bandera || '🏳'}</span>
          <div class="side-item-name">
            ${g.nombre}
            <div class="side-item-detail">${g.seleccion || ''}</div>
          </div>
          <div class="side-item-val">${g.goles} ⚽</div>
        </div>`).join('')}
    </div>`;
  }

  // Clasificados
  if (data.clasificados && data.clasificados.length) {
    html += `<div class="side-card">
      <div class="side-card-head">✅ Ya clasificados</div>
      ${data.clasificados.map(e => `
        <div class="side-item">
          <span class="side-item-flag">${e.bandera || '🏳'}</span>
          <div class="side-item-name">${e.nombre}</div>
          <div style="font-size:11px;color:var(--accent)">${e.fase || ''}</div>
        </div>`).join('')}
    </div>`;
  }

  document.getElementById('sidebar').innerHTML = html || '<div class="info-box">Sin datos</div>';
}

// ─────────────────────────────────────────────
// CARGA PRINCIPAL
// ─────────────────────────────────────────────
const FECHA_HOY = new Date().toLocaleDateString('es-AR', {
  timeZone: 'America/Argentina/Buenos_Aires',
  day: 'numeric', month: 'long', year: 'numeric'
});

function setLoader(pct, text) {
  document.getElementById('loaderFill').style.width = pct + '%';
  document.getElementById('loaderText').textContent = text;
}

async function cargarTodo() {
  try {
    setLoader(10, 'Buscando partidos del día...');

    // 1. Partidos + sidebar en paralelo
    const [partidosData, sidebarData] = await Promise.all([
      askClaude(`Busca los partidos del Mundial de Fútbol 2026 de hoy (${FECHA_HOY}).
Para cada partido incluye: local, visita, goles_local, goles_visita, estado (en_vivo/finalizado/próximo), minuto, hora_utc (ISO 8601), bandera_local, bandera_visita, fase, estadio, ranking_local, ranking_visita.
Si hay partido en vivo o finalizado, agrega stats: { posesion:[L,V], tiros:[L,V], corners:[L,V], faltas:[L,V] }.
Si hay penales agrega penales:[L,V].
Responde SOLO JSON: { "partidos_en_vivo": [...], "partidos_hoy": [...], "partidos_prox_3_dias": [...] }`),

      askClaude(`Busca datos del Mundial 2026 para el sidebar.
Responde SOLO JSON: {
  "proximos": [ { local, visita, bandera_local, bandera_visita, hora_utc, fase } ] (próximos 6 partidos),
  "top_goleadores": [ { nombre, seleccion, bandera, goles } ] (top 5),
  "clasificados": [ { nombre, bandera, fase } ] (equipos ya clasificados a octavos o siguiente fase)
}`)
    ]);

    setLoader(45, 'Cargando posiciones y goleadores...');

    // 2. Partidos
    let partidosHTML = '';
    const enVivo = partidosData.partidos_en_vivo || [];
    const hoy = partidosData.partidos_hoy || [];
    const prox = partidosData.partidos_prox_3_dias || [];

    if (enVivo.length) {
      partidosHTML += `<div class="section-head"><span class="section-title">🔴 En Vivo</span><span class="section-badge badge-live">LIVE</span></div>`;
      partidosHTML += `<div class="partidos-list">${enVivo.map(renderPartidoCard).join('')}</div>`;
    }
    if (hoy.length) {
      partidosHTML += `<div class="section-head" style="margin-top:${enVivo.length?'20px':'0'}"><span class="section-title">📅 Hoy — ${FECHA_HOY}</span><span class="section-badge badge-today">Hoy</span></div>`;
      partidosHTML += `<div class="partidos-list">${hoy.map(renderPartidoCard).join('')}</div>`;
    }
    if (prox.length) {
      partidosHTML += `<div class="section-head" style="margin-top:20px"><span class="section-title">🗓 Próximos Partidos</span></div>`;
      partidosHTML += `<div class="partidos-list">${prox.map(renderPartidoCard).join('')}</div>`;
    }
    if (!enVivo.length && !hoy.length && !prox.length) {
      partidosHTML = `<div class="info-box"><strong>Sin partidos encontrados</strong>Puede que no haya partidos programados para hoy.</div>`;
    }
    const ts = new Date().toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', hour:'2-digit', minute:'2-digit' });
    partidosHTML += `<div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`;
    document.getElementById('content-partidos').innerHTML = partidosHTML;

    // Sidebar
    renderSidebar(sidebarData);

    setLoader(65, 'Cargando tablas de posiciones...');

    // 3. Tabla + Goleadores + Estadísticas en paralelo
    const [tablaData, goleadoresData, statsData, noticiasData] = await Promise.all([
      askClaude(`Busca la tabla de posiciones del Mundial 2026, todos los grupos.
Responde SOLO JSON: { "grupos": [ { "grupo": "A", "equipos": [ { nombre, bandera, pj, g, e, p, gf, gc, pts } ] } ] }`),

      askClaude(`Busca los máximos goleadores del Mundial 2026.
Responde SOLO JSON: { "goleadores": [ { nombre, seleccion, bandera, goles, partidos } ] } (top 15 al menos)`),

      askClaude(`Busca estadísticas generales del Mundial 2026: total de goles, promedio, tarjetas, etc.
Responde SOLO JSON: {
  "generales": { partidos_jugados, total_goles, promedio_goles, total_tarjetas_amarillas, total_tarjetas_rojas, penales_convertidos, jornada },
  "asistencias": [ { nombre, seleccion, bandera, asistencias } ]
}`),

      askClaude(`Busca las últimas 8 noticias sobre el Mundial 2026 en español.
Responde SOLO JSON: { "noticias": [ { titulo, medio, hora, categoria, url } ] }`)
    ]);

    setLoader(90, 'Renderizando...');

    // 4. Tabla
    const grupos = tablaData.grupos || [];
    const tablaHTML = grupos.length
      ? `<div class="section-head"><span class="section-title">📊 Tabla de Posiciones</span></div>
         ${grupos.map(renderTablaGrupo).join('')}
         <div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`
      : `<div class="info-box"><strong>Sin datos de posiciones</strong></div>`;
    document.getElementById('content-tabla').innerHTML = tablaHTML;

    // 5. Goleadores
    const goles = goleadoresData.goleadores || [];
    const golesHTML = goles.length
      ? `<div class="section-head"><span class="section-title">🥅 Tabla de Goleadores</span></div>
         <div class="goleadores-list">${renderGoleadores(goles)}</div>
         <div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`
      : `<div class="info-box"><strong>Sin datos de goleadores</strong></div>`;
    document.getElementById('content-goleadores').innerHTML = golesHTML;

    // 6. Estadísticas
    document.getElementById('content-estadisticas').innerHTML =
      renderEstadisticas(statsData) + `<div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`;

    // 7. Noticias
    const noticias = noticiasData.noticias || [];
    const noticiasHTML = noticias.length
      ? `<div class="section-head"><span class="section-title">📰 Últimas Noticias</span></div>
         <div class="noticias-list">${renderNoticias(noticias)}</div>
         <div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`
      : `<div class="info-box"><strong>Sin noticias disponibles</strong></div>`;
    document.getElementById('content-noticias').innerHTML = noticiasHTML;

    setLoader(100, 'Listo');
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }, 400);

  } catch (err) {
    console.error(err);
    document.getElementById('loadingOverlay').classList.add('hidden');
    const msg = `<div class="info-box error"><strong>Error al cargar datos</strong>${err.message}</div>`;
    document.getElementById('content-partidos').innerHTML = msg;
  }
}

// ─────────────────────────────────────────────
// AUTO-REFRESH cada 60 segundos
// ─────────────────────────────────────────────
cargarTodo();
setInterval(() => {
  // Solo actualiza partidos (más liviano)
  askClaude(`Busca los partidos del Mundial 2026 de hoy (${FECHA_HOY}) con estados actualizados.
Incluye goles, minuto, estado. Responde SOLO JSON: { "partidos_en_vivo": [...], "partidos_hoy": [...], "partidos_prox_3_dias": [...] }`)
    .then(data => {
      const enVivo = data.partidos_en_vivo || [];
      const hoy = data.partidos_hoy || [];

      const ts = new Date().toLocaleString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', hour:'2-digit', minute:'2-digit' });
      let html = '';
      if (enVivo.length) {
        html += `<div class="section-head"><span class="section-title">🔴 En Vivo</span><span class="section-badge badge-live">LIVE</span></div><div class="partidos-list">${enVivo.map(renderPartidoCard).join('')}</div>`;
      }
      if (hoy.length) {
        html += `<div class="section-head" style="margin-top:${enVivo.length?'20px':'0'}"><span class="section-title">📅 Hoy — ${FECHA_HOY}</span><span class="section-badge badge-today">Hoy</span></div><div class="partidos-list">${hoy.map(renderPartidoCard).join('')}</div>`;
      }
      if (prox.length) {
        html += `<div class="section-head" style="margin-top:20px"><span class="section-title">🗓 Próximos Partidos</span></div><div class="partidos-list">${prox.map(renderPartidoCard).join('')}</div>`;
      }
      html += `<div class="last-update">Actualizado a las <span>${ts} hs (ARG)</span></div>`;
      document.getElementById('content-partidos').innerHTML = html;
    })
    .catch(console.error);
}, 60000);
