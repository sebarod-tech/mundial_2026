<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026</title>

<style>
:root{
    --bg:#0f172a;
    --panel:#1e293b;
    --card:#334155;
    --primary:#3b82f6;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:var(--bg);
    color:var(--text);
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:3px solid var(--primary);
}

header h1{
    color:#60a5fa;
}

nav{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:20px;
}

button{
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    background:var(--primary);
    color:white;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.panel{
    background:var(--panel);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.hidden{
    display:none;
}

.match{
    background:var(--card);
    margin:10px 0;
    padding:12px;
    border-radius:8px;
}

.match-header{
    display:flex;
    justify-content:space-between;
}

.score{
    font-size:22px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #475569;
    padding:8px;
    text-align:center;
}

th{
    background:#2563eb;
}

.bracket{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.round{
    background:var(--card);
    border-radius:8px;
    padding:10px;
}

.loading{
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<h1>🏆 Mundial FIFA 2026</h1>
<p>Resultados, Grupos y Eliminatorias</p>
</header>

<nav>
<button onclick="showTab('matches')">Resultados</button>
<button onclick="showTab('groups')">Grupos</button>
<button onclick="showTab('bracket')">Eliminatorias</button>
</nav>

<div class="container">

<div id="matches" class="panel">
<h2>⚽ Partidos</h2>
<div id="matchesContent" class="loading">Cargando...</div>
</div>

<div id="groups" class="panel hidden">
<h2>📊 Grupos</h2>
<div id="groupsContent">
<p>Disponible cuando se carguen las posiciones oficiales.</p>
</div>
</div>

<div id="bracket" class="panel hidden">
<h2>🏅 Eliminatorias</h2>

<div class="bracket">

<div class="round">
<h3>Dieciseisavos</h3>
<div id="round32"></div>
</div>

<div class="round">
<h3>Octavos</h3>
<div id="round16"></div>
</div>

<div class="round">
<h3>Cuartos</h3>
<div id="quarters"></div>
</div>

<div class="round">
<h3>Semifinales</h3>
<div id="semis"></div>
</div>

<div class="round">
<h3>Final</h3>
<div id="final"></div>
</div>

</div>
</div>

</div>

<script>

const API_KEY = "REEMPLAZAR_CON_TU_API_KEY";
const WORLD_CUP_ID = 1; // Reemplazar por el ID real del Mundial 2026

function showTab(tab){

document.querySelectorAll(".panel")
.forEach(x=>x.classList.add("hidden"));

document.getElementById(tab)
.classList.remove("hidden");

}

async function apiCall(url){

const response = await fetch(url,{
headers:{
"x-apisports-key":API_KEY
}
});

if(!response.ok){
throw new Error("Error API");
}

return response.json();

}

async function loadMatches(){

const container =
document.getElementById("matchesContent");

try{

container.innerHTML="Cargando partidos...";

const currentYear = 2026;

const data = await apiCall(
`https://v3.football.api-sports.io/fixtures?league=${WORLD_CUP_ID}&season=${currentYear}`
);

const fixtures = data.response;

if(!fixtures.length){

container.innerHTML =
"No se encontraron partidos";

return;
}

container.innerHTML="";

fixtures.slice(0,50).forEach(match=>{

const home =
match.teams.home.name;

const away =
match.teams.away.name;

const homeGoals =
match.goals.home ?? "-";

const awayGoals =
match.goals.away ?? "-";

const status =
match.fixture.status.short;

container.innerHTML += `
<div class="match">

<div class="match-header">
<div>${home}</div>
<div class="score">
${homeGoals} - ${awayGoals}
</div>
<div>${away}</div>
</div>

<div>
Estado: ${status}
</div>

</div>
`;

});

}catch(err){

container.innerHTML =
"Error al cargar partidos";

console.error(err);

}

}

function renderDemoBracket(){

for(let i=1;i<=16;i++){

document.getElementById("round32")
.innerHTML += `
<div class="match">
Partido ${i}
</div>
`;

}

}

async function init(){

renderDemoBracket();
await loadMatches();

}

init();

setInterval(loadMatches,300000);

</script>

</body>
</html>
